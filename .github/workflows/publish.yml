name: Publish to Azure DevOps Marketplace

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). Leave empty to use the version already in task.json / vss-extension.json.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)

          # Update task.json version
          jq --argjson major "$MAJOR" --argjson minor "$MINOR" --argjson patch "$PATCH" \
            '.version.Major = $major | .version.Minor = $minor | .version.Patch = $patch' \
            task.json > task.json.tmp && mv task.json.tmp task.json

          # Update vss-extension.json version
          jq --arg version "$TAG" '.version = $version' \
            vss-extension.json > vss-extension.json.tmp && mv vss-extension.json.tmp vss-extension.json

          echo "Updated versions to $MAJOR.$MINOR.$PATCH"

      - name: Set version from workflow_dispatch input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Update task.json version
          jq --argjson major "$MAJOR" --argjson minor "$MINOR" --argjson patch "$PATCH" \
            '.version.Major = $major | .version.Minor = $minor | .version.Patch = $patch' \
            task.json > task.json.tmp && mv task.json.tmp task.json

          # Update vss-extension.json version
          jq --arg version "$VERSION" '.version = $version' \
            vss-extension.json > vss-extension.json.tmp && mv vss-extension.json.tmp vss-extension.json

          echo "Updated versions to $MAJOR.$MINOR.$PATCH"

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Package extension
        run: |
          mkdir -p out
          tfx extension create --manifest-globs vss-extension.json --output-path out

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: out/*.vsix
          if-no-files-found: error

      - name: Attach VSIX to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.vsix
