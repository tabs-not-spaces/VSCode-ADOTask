# Pipeline: Run VS Code Tunnel task directly (no packaging or marketplace publish)
#
# Builds dist/task.js from source and executes it with `node` so you can
# verify the task logic works end-to-end inside a real Azure Pipelines job.
#
# azure-pipelines-task-lib reads task inputs from INPUT_<UPPERCASENAME>
# environment variables, so no extension install is required.
#
# Customise the env block under "Run task" to change input values.

trigger: none

parameters:
  - name: tunnelName
    displayName: 'Tunnel name (max 20 chars)'
    type: string
    default: 'ado-pipeline-tunnel'
  - name: connectionTimeout
    displayName: 'Connection timeout (minutes)'
    type: number
    default: 5
  - name: sessionTimeout
    displayName: 'Session timeout (minutes)'
    type: number
    default: 60
  - name: noCacheCliAuth
    displayName: 'Disable auth caching'
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    displayName: 'Use Node.js 20'
    inputs:
      versionSpec: '20.x'

  - script: |
      corepack enable
      pnpm install --frozen-lockfile
    displayName: 'Install dependencies'

  - script: pnpm run build
    displayName: 'Build task (esbuild → dist/task.js)'

  - script: node dist/task.js
    displayName: 'Run task'
    env:
      # azure-pipelines-task-lib picks up inputs from INPUT_<UPPERCASENAME>
      INPUT_TUNNELNAME: ${{ parameters.tunnelName }}
      INPUT_CONNECTIONTIMEOUT: ${{ parameters.connectionTimeout }}
      INPUT_SESSIONTIMEOUT: ${{ parameters.sessionTimeout }}
      INPUT_NOCACHECLIAUTH: ${{ parameters.noCacheCliAuth }}
